<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avanzado: Centrífuga Tubular Industrial RA</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            background-color: #000;
        }
        
        /* Panel de Control UI Fiel a la Guía del Usuario */
        #ui-container {
            position: absolute;
            bottom: 12px;
            left: 5%;
            width: 90%;
            max-width: 550px;
            background: rgba(248, 249, 250, 0.95);
            color: #1e293b;
            padding: 16px;
            box-sizing: border-box;
            z-index: 9999;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .slider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .slider-box {
            display: flex;
            flex-direction: column;
        }

        .slider-box label {
            font-size: 12px;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 4px;
        }

        .slider {
            width: 100%;
            accent-color: #f97316;
            cursor: pointer;
        }

        .slider-box .val {
            font-size: 13px;
            font-weight: 700;
            color: #f97316;
            margin-top: 2px;
            font-family: monospace;
        }

        /* Bloque de Métricas e Indicadores de Salida */
        .metrics-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            background: #ffffff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .metric-card {
            font-size: 11px;
            color: #475569;
            font-weight: 600;
        }

        .metric-card span {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 3px;
            font-family: monospace;
        }

        /* Leyenda de Fases */
        .legend-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot-silice { width: 10px; height: 10px; background-color: #d97706; border-radius: 50%; }
        .dot-agua { width: 10px; height: 10px; background-color: #3b82f6; border-radius: 50%; }
        .dot-torta { width: 10px; height: 10px; background-color: #a855f7; border-radius: 50%; }

        /* Botones Operativos de Control */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-base {
            border: none;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background 0.2s;
            color: white;
        }

        #btn-action-pausa { background-color: #10b981; }
        #btn-action-pausa:hover { background-color: #059669; }
        #btn-action-pausa.pausado { background-color: #ef4444; }

        #btn-action-reset { background-color: #3b82f6; }
        #btn-action-reset:hover { background-color: #2563eb; }
    </style>
</head>
<body>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            
            <a-entity id="centrifuga-industrial" position="0 0 0">
                
                <a-cylinder position="0 0.6 0" radius="0.30" height="1.0" 
                            color="#e2e8f0" opacity="0.15" material="transparent: true; side: double; roughness: 0.1">
                </a-cylinder>

                <a-cylinder id="tabor-rotor" position="0 0.6 0" radius="0.25" height="0.95" 
                            color="#93c5fd" opacity="0.2" material="transparent: true; side: double; roughness: 0.2">
                </a-cylinder>

                <a-cylinder id="eje-central" position="0 0.6 0" radius="0.015" height="1.1" color="#cbd5e1" metalness="0.8"></a-cylinder>

                <a-cylinder position="0 1.1 0" radius="0.32" height="0.08" color="#64748b" metalness="0.6"></a-cylinder>
                <a-cone position="0 1.2 0" radius-bottom="0.32" radius-top="0.15" height="0.12" color="#475569"></a-cone>

                <a-cylinder position="-0.38 1.05 0" rotation="0 0 75" radius="0.02" height="0.25" color="#3b82f6" opacity="0.8"></a-cylinder>
                <a-cylinder position="0.38 1.05 0" rotation="0 0 -75" radius="0.02" height="0.25" color="#d97706" opacity="0.8"></a-cylinder>

                <a-cylinder position="0 0.06 0" radius="0.32" height="0.06" color="#64748b" metalness="0.6"></a-cylinder>
                <a-cylinder position="0 0.01 0" rotation="90 0 0" radius="0.02" height="0.4" color="#475569"></a-cylinder>

                <a-entity id="contenedor-fases"></a-entity>

            </a-entity>
            
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <div id="ui-container">
        
        <div class="slider-grid">
            <div class="slider-box">
                <label for="s-rpm">Velocidad (RPM)</label>
                <input type="range" id="s-rpm" class="slider" min="0" max="25000" step="500" value="12000">
                <span id="v-rpm" class="val">12000</span>
            </div>
            <div class="slider-box">
                <label for="s-radio">Radio Tazón (m)</label>
                <input type="range" id="s-radio" class="slider" min="0.01" max="0.30" step="0.01" value="0.22">
                <span id="v-radio" class="val">0.22 m</span>
            </div>
            <div class="slider-box">
                <label for="s-delta">Δρ (Diferencia ρ)</label>
                <input type="range" id="s-delta" class="slider" min="500" max="3500" step="100" value="1650">
                <span id="v-delta" class="val">1650 kg/m³</span>
            </div>
        </div>

        <div class="metrics-row">
            <div class="metric-card">ω (Vel. Angular) <span id="out-omega">0.00 rad/s</span></div>
            <div class="metric-card">Factor G (FCR) <span id="out-g">0.0</span></div>
            <div class="metric-card">vt (Sedimentación) <span id="out-vt">0.00e+0 m/s</span></div>
        </div>

        <div class="legend-container">
            <div class="legend-item"><span class="dot-silice"></span> Sílice (Sólido)</div>
            <div class="legend-item"><span class="dot-agua"></span> Agua (Líquido)</div>
            <div class="legend-item"><span class="dot-torta"></span> Torta Compactada</div>
        </div>

        <div class="btn-row">
            <button id="btn-action-pausa" class="btn-base">▶ CONTINUAR</button>
            <button id="btn-action-reset" class="btn-base">🔄 REINICIAR MEZCLA</button>
        </div>
    </div>

    <script>
        // --- PARÁMETROS DEL MODELAMIENTO CIENTÍFICO ---
        let isRunning = true; 
        const dp = 25e-6;        // Diámetro micrométrico de la partícula de Sílice
        const viscosidad = 1e-3; // Viscosidad dinámica del agua a condiciones estándar
        const gravedad = 9.81;

        let rpm = 12000;
        let radioTazon = 0.22;
        let deltaRho = 1650;

        const numParticulas = 140;
        let arregloParticulas = [];

        // Conexiones de la Interfaz
        const sliderRPM = document.getElementById('s-rpm');
        const sliderRadio = document.getElementById('s-radio');
        const sliderDelta = document.getElementById('s-delta');
        const txtRPM = document.getElementById('v-rpm');
        const txtRadio = document.getElementById('v-radio');
        const txtDelta = document.getElementById('v-delta');

        const displayOmega = document.getElementById('out-omega');
        const displayG = document.getElementById('out-g');
        const displayVt = document.getElementById('out-vt');

        const btnPausa = document.getElementById('btn-action-pausa');
        const btnReset = document.getElementById('btn-action-reset');
        const contenedorFases = document.getElementById('contenedor-fases');
        const taborRotor = document.getElementById('tabor-rotor');

        // --- SISTEMA DE INYECCIÓN ADAPTATIVO SÍLICE-AGUA ---
        function inyectarAlimentacion() {
            contenedorFases.innerHTML = "";
            arregloParticulas = [];

            for (let i = 0; i < numParticulas; i++) {
                // Generación dentro de la zona de flujo líquido del tazón
                let rInicial = Math.random() * (radioTazon * 0.6); 
                let anguloInicial = Math.random() * Math.PI * 2;
                let yInicial = Math.random() * 0.85 + 0.12;

                let el = document.createElement('a-sphere');
                el.setAttribute('radius', '0.009');
                el.setAttribute('color', '#d97706'); // Color inicial: Sílice (Sólido - Amarillo/Naranja)
                el.setAttribute('opacity', '0.9');
                contenedorFases.appendChild(el);

                arregloParticulas.push({
                    elemento: el,
                    r: rInicial,
                    angulo: anguloInicial,
                    y: yInicial,
                    estado: 'silice' // Estados de fase válidos: 'silice' o 'torta'
                });
            }
        }

        function recalcularVariables() {
            rpm = parseFloat(sliderRPM.value);
            radioTazon = parseFloat(sliderRadio.value);
            deltaRho = parseFloat(sliderDelta.value);

            txtRPM.textContent = rpm;
            txtRadio.textContent = radioTazon.toFixed(2) + " m";
            txtDelta.textContent = deltaRho + " kg/m³";

            // Modificación geométrica del tazón industrial transparente
            let factorEscala = radioTazon / 0.25;
            taborRotor.setAttribute('scale', `${factorEscala} 1 ${factorEscala}`);
        }

        // Detectores de cambios en los Sliders
        sliderRPM.addEventListener('input', recalcularVariables);
        sliderRadio.addEventListener('input', () => { recalcularVariables(); inyectarAlimentacion(); });
        sliderDelta.addEventListener('input', recalcularVariables);

        // Control de los Botones Operativos
        btnPausa.addEventListener('click', () => {
            isRunning = !isRunning;
            if (isRunning) {
                btnPausa.textContent = "▶ CONTINUAR";
                btnPausa.classList.remove('pausado');
            } else {
                btnPausa.textContent = "⏸ PAUSAR";
                btnPausa.classList.add('pausado');
            }
        });

        btnReset.addEventListener('click', () => {
            inyectarAlimentacion();
        });

        // --- LOOP DE INTEGRACIÓN FISICOMATEMÁTICA ---
        let tiempoAnterior = performance.now();

        function bucleFlujo(tiempoActual) {
            let dt = (tiempoActual - tiempoAnterior) / 1000;
            tiempoAnterior = tiempoActual;
            if (dt > 0.1) dt = 0.1;

            // Fórmulas matemáticas aplicadas (McCabe / Geankoplis)
            let omega = (2 * Math.PI * rpm) / 60; 
            let factorG = (Math.pow(omega, 2) * radioTazon) / gravedad;
            let vtMax = (Math.pow(dp, 2) * deltaRho * Math.pow(omega, 2) * radioTazon) / (18 * viscosidad);

            // Actualización de los recuadros matemáticos de la UI
            displayOmega.textContent = omega.toFixed(2) + " rad/s";
            displayG.textContent = rpm > 0 ? factorG.toFixed(1) : "0.0";
            displayVt.textContent = rpm > 0 ? vtMax.toExponential(3) + " m/s" : "0.000e+0 m/s";

            // Simulación del movimiento y transición de fase sólida a torta compactada
            if (isRunning && rpm > 0) {
                arregloParticulas.forEach(p => {
                    
                    if (p.estado === 'silice') {
                        // Velocidad diferencial según posición radial
                        let vtLocal = (Math.pow(dp, 2) * deltaRho * Math.pow(omega, 2) * p.r) / (18 * viscosidad);
                        p.r += vtLocal * dt;
                        
                        // Rotación cinemática del fluido
                        p.angulo += omega * dt * 0.05;
                        // Flujo ascencional constante hacia las descargas superiores
                        p.y += 0.08 * dt;

                        // TRANSICIÓN DE FASE CRÍTICA: Al tocar la pared del tazón se vuelve Torta Compactada
                        if (p.r >= radioTazon) {
                            p.r = radioTazon; 
                            p.estado = 'torta';
                            p.elemento.setAttribute('color', '#a855f7'); // Cambia a Violeta (Torta Compactada)
                        }
                        
                        if (p.y > 1.05) { // Si sale por la canaleta superior sin separarse por completo
                            p.y = 0.12;
                            p.r = Math.random() * (radioTazon * 0.4);
                        }

                    } else if (p.estado === 'torta') {
                        // Las partículas compactadas giran solidarias con la velocidad de la pared del tazón
                        p.angulo += omega * dt * 0.05;
                    }

                    // Conversión polar a cartesiana 3D
                    let x = p.r * Math.cos(p.angulo);
                    let z = p.r * Math.sin(p.angulo);

                    p.elemento.setAttribute('position', `${x} ${p.y} ${z}`);
                });
            }

            requestAnimationFrame(bucleFlujo);
        }

        // Inicialización del simulador industrial
        inyectarAlimentacion();
        recalcularVariables();
        requestAnimationFrame(bucleFlujo);
    </script>
</body>
</html>
