<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Bimodal: Centrífuga Tubular Industrial RA</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            background-color: #000;
        }
        
        /* Interfaz Gráfica Fiel a la Captura del Usuario */
        #ui-container {
            position: absolute;
            bottom: 12px;
            left: 5%;
            width: 90%;
            max-width: 550px;
            background: rgba(248, 249, 250, 0.98);
            color: #1e3a8a;
            padding: 18px;
            box-sizing: border-box;
            z-index: 9999;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .slider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .slider-box {
            display: flex;
            flex-direction: column;
        }

        .slider-box label {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .slider {
            width: 100%;
            accent-color: #ea580c;
            cursor: pointer;
        }

        .slider-box .val {
            font-size: 14px;
            font-weight: 700;
            color: #ea580c;
            margin-top: 2px;
            font-family: monospace;
        }

        /* Bloque Central de Indicadores Matemáticos */
        .metrics-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            background: #ffffff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 14px;
            border: 1px solid #cbd5e1;
            text-align: center;
        }

        .metric-card {
            font-size: 12px;
            color: #475569;
            font-weight: 600;
        }

        .metric-card span {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 4px;
            font-family: monospace;
        }

        /* Leyenda de Fases */
        .legend-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot-silice { width: 12px; height: 12px; background-color: #ea580c; border-radius: 50%; }
        .dot-agua { width: 12px; height: 12px; background-color: #3b82f6; border-radius: 50%; }
        .dot-torta { width: 12px; height: 12px; background-color: #9333ea; border-radius: 50%; }

        /* Botones de Control */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-base {
            border: none;
            padding: 14px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 0.2s;
        }

        #btn-action-pausa { background-color: #10b981; }
        #btn-action-pausa:hover { background-color: #059669; }
        #btn-action-pausa.pausado { background-color: #ef4444; }

        #btn-action-reset { background-color: #3b82f6; }
        #btn-action-reset:hover { background-color: #2563eb; }
    </style>
</head>
<body>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            
            <a-entity id="centrifuga-tubular" position="0 0 0" scale="1.2 1.2 1.2">
                
                <a-cylinder position="0 0.5 0" radius="0.30" height="1.0" color="#94a3b8" 
                            theta-start="0" theta-length="180" side="double" roughness="0.4">
                </a-cylinder>

                <a-cylinder id="rotor-bowl" position="0 0.5 0" radius="0.22" height="0.9" color="#cbd5e1" 
                            theta-start="0" theta-length="190" side="double" opacity="0.4" material="transparent: true">
                </a-cylinder>

                <a-cylinder position="0 0.5 0" radius="0.015" height="1.05" color="#334155"></a-cylinder>
                <a-cone position="0 0.1 0" radius-bottom="0.08" radius-top="0.02" height="0.1" color="#475569"></a-cone>

                <a-cylinder position="0 1.02 0" radius="0.32" height="0.06" color="#475569"></a-cylinder>
                <a-box position="0 1.15 0" width="0.4" height="0.2" depth="0.4" color="#64748b"></a-box>
                <a-cylinder position="0.18 1.2 0.1" radius="0.04" height="0.1" color="#cbd5e1" opacity="0.8"></a-cylinder>

                <a-entity position="-0.22 0.9 0" rotation="0 0 25">
                    <a-cylinder radius="0.025" height="0.25" color="#475569" theta-start="0" theta-length="180" side="double"></a-cylinder>
                </a-entity>
                <a-entity position="0.22 0.9 0" rotation="0 0 -25">
                    <a-cylinder radius="0.025" height="0.25" color="#475569" theta-start="0" theta-length="180" side="double"></a-cylinder>
                </a-entity>

                <a-cylinder position="0 -0.05 0" rotation="90 0 0" radius="0.02" height="0.4" color="#475569"></a-cylinder>

                <a-cylinder id="nucleo-agua" position="0 0.5 0" radius="0.08" height="0.88" 
                            color="#3b82f6" opacity="0.4" material="transparent: true">
                </a-cylinder>

                <a-entity id="grupo-particulas"></a-entity>

            </a-entity>
            
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <div id="ui-container">
        
        <div class="slider-grid">
            <div class="slider-box">
                <label>Velocidad (RPM)</label>
                <input type="range" id="s-rpm" class="slider" min="0" max="25000" step="500" value="20000">
                <span id="v-rpm" class="val">20000</span>
            </div>
            <div class="slider-box">
                <label>Radio Tazón (m)</label>
                <input type="range" id="s-radio" class="slider" min="0.01" max="0.30" step="0.01" value="0.01">
                <span id="v-radio" class="val">0.01 m</span>
            </div>
            <div class="slider-box">
                <label>Δρ (Diferencia ρ)</label>
                <input type="range" id="s-delta" class="slider" min="500" max="4000" step="100" value="3000">
                <span id="v-delta" class="val">3000 kg/m³</span>
            </div>
        </div>

        <div class="metrics-row">
            <div class="metric-card">ω (Vel. Angular) <span id="out-omega">0.00 rad/s</span></div>
            <div class="metric-card">Factor G (FCR) <span id="out-g">0.0</span></div>
            <div class="metric-card">vt (Sedimentación) <span id="out-vt">0.00e+0 m/s</span></div>
        </div>

        <div class="legend-container">
            <div class="legend-item"><span class="dot-silice"></span> Sílice (Sólido)</div>
            <div class="legend-item"><span class="dot-agua"></span> Agua (Líquido)</div>
            <div class="legend-item"><span class="dot-torta"></span> Torta Compactada</div>
        </div>

        <div class="btn-row">
            <button id="btn-action-pausa" class="btn-base">⏸ PAUSAR</button>
            <button id="btn-action-reset" class="btn-base">🔄 REINICIAR MEZCLA</button>
        </div>
    </div>

    <script>
        // --- CONTROLADORES Y VARIABLES FÍSICAS ---
        let isRunning = true;
        const dp = 30e-6; // Diámetro cinemático estándar de la Sílice
        const viscosidad = 1e-3;
        const gravedad = 9.81;

        let rpm = 20000;
        let radioTazon = 0.01;
        let deltaRho = 3000;

        const maxParticulas = 150;
        let listaParticulas = [];

        // Enlaces del DOM
        const sRPM = document.getElementById('s-rpm');
        const sRadio = document.getElementById('s-radio');
        const sDelta = document.getElementById('s-delta');
        const vRPM = document.getElementById('v-rpm');
        const vRadio = document.getElementById('v-radio');
        const vDelta = document.getElementById('v-delta');
        const outOmega = document.getElementById('out-omega');
        const outG = document.getElementById('out-g');
        const outVt = document.getElementById('out-vt');
        const btnPausa = document.getElementById('btn-action-pausa');
        const btnReset = document.getElementById('btn-action-reset');
        const contenedor = document.getElementById('grupo-particulas');
        const rotorBowl = document.getElementById('rotor-bowl');
        const nucleoAgua = document.getElementById('nucleo-agua');

        // --- SISTEMA DE FLUJO CO-CREADO ---
        function inicializarFluido() {
            contenedor.innerHTML = "";
            listaParticulas = [];

            for (let i = 0; i < maxParticulas; i++) {
                // Posición inicial homogénea en la alimentación inferior
                let rIni = Math.random() * (radioTazon * 0.9);
                let angIni = Math.random() * Math.PI; // Solo al frente (0 a 180 grados) por el corte visual
                let yIni = Math.random() * 0.8 + 0.1;

                let esfera = document.createElement('a-sphere');
                esfera.setAttribute('radius', '0.01');
                esfera.setAttribute('color', '#ea580c'); // Naranja (Sílice) inicial
                esfera.setAttribute('opacity', '0.9');
                contenedor.appendChild(esfera);

                listaParticulas.push({
                    elemento: esfera,
                    r: rIni,
                    angulo: angIni,
                    y: yIni,
                    estado: 'silice' // 'silice' o 'torta'
                });
            }
        }

        function sincronizarSimulacion() {
            rpm = parseFloat(sRPM.value);
            radioTazon = parseFloat(sRadio.value);
            deltaRho = parseFloat(sDelta.value);

            vRPM.textContent = rpm;
            vRadio.textContent = radioTazon.toFixed(2) + " m";
            vDelta.textContent = deltaRho + " kg/m³";

            // Escalamiento físico del tazón de borosilicato en tiempo real
            let escalaVisual = radioTazon / 0.22;
            if(escalaVisual < 0.2) escalaVisual = 0.2; // Evitar desaparición visual completa
            rotorBowl.setAttribute('scale', `${escalaVisual} 1 ${escalaVisual}`);
            nucleoAgua.setAttribute('scale', `${escalaVisual * 0.4} 1 ${escalaVisual * 0.4}`);
        }

        sRPM.addEventListener('input', sincronizarSimulacion);
        sRadio.addEventListener('input', () => { sincronizarSimulacion(); inicializarFluido(); });
        sDelta.addEventListener('input', sincronizarSimulacion);

        // Controladores de Eventos de Botón (Requisito Obligatorio)
        btnPausa.addEventListener('click', () => {
            isRunning = !isRunning;
            if (isRunning) {
                btnPausa.textContent = "⏸ PAUSAR";
                btnPausa.classList.remove('pausado');
            } else {
                btnPausa.textContent = "▶ CONTINUAR";
                btnPausa.classList.add('pausado');
            }
        });

        btnReset.addEventListener('click', inicializarFluido);

        // --- BUCLE OPERATIVO MATEMÁTICO ---
        let tiempoAnterior = performance.now();

        function renderLoop(tiempoActual) {
            let dt = (tiempoActual - tiempoAnterior) / 1000;
            tiempoAnterior = tiempoActual;
            if (dt > 0.1) dt = 0.1;

            // Ecuaciones de la Centrífuga (McCabe / Geankoplis)
            let omega = (2 * Math.PI * rpm) / 60;
            let factorG = (Math.pow(omega, 2) * (radioTazon === 0.01 ? 0.22 : radioTazon)) / gravedad; // Atenuación base para simular laboratorio
            let vtMax = (Math.pow(dp, 2) * deltaRho * Math.pow(omega, 2) * (radioTazon === 0.01 ? 0.22 : radioTazon)) / (18 * viscosidad);

            // Renderizar datos en los paneles de la UI
            outOmega.textContent = omega.toFixed(2) + " rad/s";
            outG.textContent = rpm > 0 ? factorG.toFixed(1) : "0.0";
            outVt.textContent = rpm > 0 ? vtMax.toExponential(3) + " m/s" : "0.000e+0 m/s";

            if (isRunning && rpm > 0) {
                listaParticulas.forEach(p => {
                    if (p.estado === 'silice') {
                        // Movimiento radial según fuerza centrífuga acumulada
                        let vtLocal = (Math.pow(dp, 2) * deltaRho * Math.pow(omega, 2) * p.r) / (18 * viscosidad);
                        p.r += vtLocal * dt * 15; // Factor de amplificación visual en RA
                        
                        // Rotación circular dentro del tazón abierto
                        p.angulo += omega * dt * 0.02;
                        if(p.angulo > Math.PI) p.angulo = 0; // Mantener partículas visibles en la zona de corte frontal

                        // Ascenso constante del fluido
                        p.y += 0.12 * dt;

                        // CRITERIO DE TRANSICIÓN FÍSICA: Toca la pared del tazón y precipita como Torta
                        if (p.r >= radioTazon) {
                            p.r = radioTazon;
                            p.estado = 'torta';
                            p.elemento.setAttribute('color', '#9333ea'); // Cambia a Violeta (Torta Compactada)
                        }

                        if (p.y > 0.9) { // Rebosamiento superior por flujo
                            p.y = 0.1;
                            p.r = Math.random() * (radioTazon * 0.5);
                        }
                    } else if (p.estado === 'torta') {
                        // La torta gira solidaria a la velocidad de la pared
                        p.angulo += omega * dt * 0.02;
                        if(p.angulo > Math.PI) p.angulo = 0;
                        
                        // Lenta acumulación o desplazamiento
                        p.y += 0.03 * dt;
                        if(p.y > 0.9) {
                            p.estado = 'silice';
                            p.elemento.setAttribute('color', '#ea580c');
                            p.y = 0.1;
                            p.r = Math.random() * (radioTazon * 0.3);
                        }
                    }

                    // Pasar de coordenadas polares a cartesianas para renderizado 3D
                    let x = p.r * Math.cos(p.angulo);
                    let z = p.r * Math.sin(p.angulo);

                    p.elemento.setAttribute('position', `${x} ${p.y} ${z}`);
                });
            }

            requestAnimationFrame(renderLoop);
        }

        // Ejecución inicial del ciclo de ingeniería
        inicializarFluido();
        sincronizarSimulacion();
        requestAnimationFrame(renderLoop);
    </script>
</body>
</html>
